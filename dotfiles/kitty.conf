# ═══════════════════════════════════════════
# Kitty — Catppuccin Mocha
# ═══════════════════════════════════════════

# ─── Font ───
font_family      JetBrainsMono Nerd Font
bold_font         JetBrainsMono Nerd Font Bold
italic_font       JetBrainsMono Nerd Font Italic
bold_italic_font  JetBrainsMono Nerd Font Bold Italic
font_size         13.0
font_features     JetBrainsMono Nerd Font +liga +calt +ss01 +ss02 +ss03 +ss04 +ss05 +ss06 +ss07 +ss08
adjust_line_height  0
adjust_column_width 0

# ─── Window ───
background_opacity 0.92
dynamic_background_opacity yes
background_blur 16
window_padding_width 16
hide_window_decorations yes

# ─── Shell ───
shell zsh

# ─── Cursor ───
cursor_shape block
cursor_beam_thickness 1.5
cursor_blink_interval 0.5
cursor_stop_blinking_after 5.0

# ─── Tab bar ───
tab_bar_style powerline
tab_bar_edge top
tab_bar_margin_width 2.0
tab_bar_margin_height 0.0 4.0
tab_bar_align center
tab_separator " "
active_tab_foreground #1e1e2e
active_tab_background #fab387
active_tab_font_style bold
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background #11111b

# ─── Scrollback ───
scrollback_lines 10000
scrollback_pager_history_size 100

# ─── Bell ───
enable_audio_bell no
visual_bell_duration 0
visual_bell_color #f38ba8

# ─── Mouse ───
mouse_hide_wait 2.0
select_by_word_characters :.@-_

# ─── Performance ───
repaint_delay 6
input_delay 1
sync_to_monitor no

# ─── Colors: Catppuccin Mocha ───
foreground #cdd6f4
background #1e1e2e
selection_foreground #1e1e2e
selection_background #f5e0dc

url_color #f5c2e7

# black
color0 #45475a
color8 #585b70

# red
color1 #f38ba8
color9 #f38ba8

# green
color2 #a6e3a1
color10 #a6e3a1

# yellow
color3 #f9e2af
color11 #f9e2af

# blue
color4 #89b4fa
color12 #89b4fa

# magenta
color5 #f5c2e7
color13 #f5c2e7

# cyan
color6 #94e2d5
color14 #94e2d5

# white
color7 #bac2de
color15 #a6adc8

# ─── Underline styling ───
url_style curly
